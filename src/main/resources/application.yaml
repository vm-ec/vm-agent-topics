server:
  port: 8086

#spring:
#  kafka:
#    bootstrap-servers: 172.31.79.2:9092

spring:
  kafka:
    bootstrap-servers: ec2-100-52-192-86.compute-1.amazonaws.com:9092
# bootstrap-servers: 172.31.79.2:9092  # Replace with EC2 private or public IP
    consumer:
      group-id: metrics-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer



    properties:
      metadata.max.age.ms: 5000
kafka:
  topic:
    metrics: ai-metrics

ai-agent:
  metrics:
    source-url: http://localhost:8083/ai/metrics

dashboard:
  ingest-url: http://localhost:8082/internal/metrics
